<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blue J</title>
    <link rel="stylesheet" href="../src/renderer/styles/main.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- Sidebar -->
    <aside class="sidebar collapsed" id="sidebar">
      <div class="sidebar-header">
        <button class="new-chat-btn" id="new-chat-btn">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          New chat
        </button>
        <button class="sidebar-toggle" id="sidebar-close">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="9" y1="3" x2="9" y2="21"></line>
          </svg>
        </button>
      </div>
      <div class="sidebar-conversations" id="sidebar-conversations">
        <!-- Conversation history items go here -->
      </div>
    </aside>

    <!-- Main content -->
    <main class="main-content" id="main-content">
      <!-- Top bar -->
      <header class="topbar">
        <div class="topbar-left">
          <button class="sidebar-open-btn" id="sidebar-open">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="9" y1="3" x2="9" y2="21"></line>
            </svg>
          </button>
          <div class="model-selector">
            <span class="model-name">Blue J</span>
          </div>
        </div>
        <div class="topbar-right">
          <button class="settings-btn" id="settings-btn" title="Settings">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="3"></circle>
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
              ></path>
            </svg>
          </button>
        </div>
      </header>

      <!-- Messages area -->
      <div class="messages-wrapper">
        <div class="messages" id="messages">
          <div class="empty-state" id="empty-state">
            <div class="empty-state-icon">
              <svg
                width="40"
                height="40"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
                ></path>
              </svg>
            </div>
            <h2>How can I help you today?</h2>
            <div class="suggestion-grid">
              <button
                class="suggestion-card"
                data-prompt="Explain quantum computing in simple terms"
              >
                <span class="suggestion-title">Explain quantum computing</span>
                <span class="suggestion-sub">in simple terms</span>
              </button>
              <button
                class="suggestion-card"
                data-prompt="Write a Python script to sort a list of dictionaries by a key"
              >
                <span class="suggestion-title">Write a Python script</span>
                <span class="suggestion-sub"
                  >to sort a list of dictionaries</span
                >
              </button>
              <button
                class="suggestion-card"
                data-prompt="What are the best practices for REST API design?"
              >
                <span class="suggestion-title">Best practices</span>
                <span class="suggestion-sub">for REST API design</span>
              </button>
              <button
                class="suggestion-card"
                data-prompt="Help me debug a JavaScript async/await issue"
              >
                <span class="suggestion-title">Help me debug</span>
                <span class="suggestion-sub"
                  >a JavaScript async/await issue</span
                >
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Input area -->
      <div class="input-area">
        <div id="file-attachments" class="file-attachments"></div>
        <div class="input-container">
          <input
            type="file"
            id="file-input"
            accept=".pdf,.txt,.text"
            multiple
            style="display: none"
          />
          <textarea
            id="message-input"
            placeholder="Message Blue J..."
            rows="1"
          ></textarea>
          <div class="input-toolbar">
            <div class="input-toolbar-left">
              <div class="tools-dropdown-wrapper">
                <button id="tools-btn" class="tools-btn" title="Tools">
                  <svg
                    width="15"
                    height="15"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path
                      d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"
                    ></path>
                  </svg>
                  <span>Tools</span>
                  <svg
                    width="11"
                    height="11"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <polyline points="6 9 12 15 18 9"></polyline>
                  </svg>
                </button>
                <div class="tools-dropdown" id="tools-dropdown">
                  <button class="tools-dropdown-item" id="dropdown-attach-btn">
                    <svg
                      width="15"
                      height="15"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <path
                        d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"
                      ></path>
                    </svg>
                    Attach Document
                  </button>
                </div>
              </div>
            </div>
            <div class="input-toolbar-right">
              <button id="send-button" class="send-btn" disabled>
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                >
                  <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>
        <p class="input-disclaimer">
          Blue J can make mistakes. Consider checking important information.
        </p>
      </div>
    </main>

    <!-- Settings Modal -->
    <div class="modal" id="settings-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Settings</h2>
          <button class="modal-close" id="modal-close">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="backend-select">Backend</label>
            <select id="backend-select">
              <option value="ollama">Ollama</option>
              <option value="llamacpp">llama.cpp</option>
              <option value="lmstudio">LM Studio</option>
              <option value="mistral">Mistral API</option>
            </select>
          </div>
          <div class="form-group">
            <label for="endpoint-input">API Endpoint</label>
            <input
              type="text"
              id="endpoint-input"
              placeholder="http://127.0.0.1:11434"
            />
            <small
              id="endpoint-help-text"
              style="
                color: #8e8ea0;
                font-size: 12px;
                margin-top: 4px;
                display: block;
              "
            >
              Default ports: Ollama (11434), llama.cpp (8080), LM Studio (1234)
            </small>
          </div>
          <div
            class="form-group"
            id="mistral-api-key-group"
            style="display: none"
          >
            <label for="mistral-api-key-input">Mistral API Key</label>
            <input
              type="password"
              id="mistral-api-key-input"
              placeholder="Enter your Mistral API key"
              autocomplete="off"
            />
            <div class="settings-inline-actions">
              <small id="mistral-key-status">No key saved</small>
              <button
                type="button"
                class="btn-secondary btn-small"
                id="clear-mistral-key-btn"
              >
                Clear saved key
              </button>
            </div>
          </div>
          <div class="form-group">
            <label for="model-select">Model</label>
            <select id="model-select">
              <option value="">Loading models...</option>
            </select>
          </div>
          <div class="form-group">
            <label for="username-input">Username</label>
            <input
              type="text"
              id="username-input"
              placeholder="Enter your username"
              maxlength="20"
            />
          </div>
          <div class="form-group">
            <label for="system-prompt-input">System Prompt</label>
            <textarea
              id="system-prompt-input"
              placeholder="Enter system prompt for the AI (optional)"
              rows="4"
            ></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" id="cancel-btn">Cancel</button>
          <button class="btn-primary" id="save-settings-btn">Save</button>
        </div>
      </div>
    </div>

    <script src="../src/renderer/js/chat.js"></script>
  </body>
</html>
