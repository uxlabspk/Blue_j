<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ollama Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <style>
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message {
        animation: fadeIn 0.3s ease-in;
      }

      .message.user .message-header::before {
        content: "👤";
      }

      .message.assistant .message-header::before {
        content: "🤖";
      }

      @keyframes typing {
        0%,
        60%,
        100% {
          transform: translateY(0);
          opacity: 0.7;
        }
        30% {
          transform: translateY(-10px);
          opacity: 1;
        }
      }

      .typing-indicator span {
        animation: typing 1.4s infinite;
      }

      .typing-indicator span:nth-child(2) {
        animation-delay: 0.2s;
      }

      .typing-indicator span:nth-child(3) {
        animation-delay: 0.4s;
      }

      .messages::-webkit-scrollbar {
        width: 8px;
      }

      .messages::-webkit-scrollbar-track {
        background: #f1f1f1;
      }

      .messages::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 4px;
      }

      .messages::-webkit-scrollbar-thumb:hover {
        background: #555;
      }
    </style>
  </head>
  <body
    class="flex flex-col h-screen bg-gradient-to-br from-indigo-500 to-purple-600 overflow-hidden"
  >
    <div
      class="bg-white/95 backdrop-blur-md px-8 py-5 shadow-lg flex items-center justify-between"
    >
      <h1
        class="text-2xl font-semibold text-gray-800 flex items-center gap-2.5 before:content-['🤖'] before:text-3xl"
      >
        Ollama Chat
      </h1>
      <div class="text-xs text-gray-600 bg-gray-100 px-3 py-1.5 rounded-full">
        Model: qwen2.5-coder:7b
      </div>
    </div>

    <div
      class="flex-1 flex flex-col max-w-6xl w-full mx-auto my-5 bg-white rounded-2xl shadow-2xl overflow-hidden"
    >
      <div class="messages flex-1 overflow-y-auto p-8 bg-gray-50" id="messages">
        <div class="empty-state text-center py-15 px-5 text-gray-400">
          <h2 class="text-2xl mb-3 text-gray-600">Welcome to Ollama Chat</h2>
          <p class="text-base">
            Start a conversation by typing a message below
          </p>
        </div>
      </div>
      <div
        class="flex px-8 py-5 bg-white border-t border-gray-200 gap-3 items-center"
      >
        <input
          type="text"
          id="message-input"
          placeholder="Type your message here..."
          class="flex-1 px-5 py-3.5 border-2 border-gray-200 outline-none bg-gray-50 rounded-full text-base transition-all duration-300 focus:border-indigo-500 focus:bg-white focus:ring-4 focus:ring-indigo-500/10"
        />
        <button
          id="send-button"
          class="px-8 py-3.5 border-none outline-none bg-gradient-to-br from-indigo-500 to-purple-600 text-white rounded-full cursor-pointer text-base font-semibold transition-all duration-300 shadow-lg shadow-indigo-500/40 hover:shadow-xl hover:shadow-indigo-500/60 hover:-translate-y-0.5 active:translate-y-0 disabled:opacity-60 disabled:cursor-not-allowed"
        >
          Send
        </button>
      </div>
    </div>

    <script src="chat.js"></script>
  </body>
</html>
