<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ollama Chat</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Sidebar -->
    <aside class="sidebar collapsed" id="sidebar">
      <div class="sidebar-header">
        <button class="new-chat-btn" id="new-chat-btn">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          New chat
        </button>
        <button class="sidebar-toggle" id="sidebar-close">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="9" y1="3" x2="9" y2="21"></line>
          </svg>
        </button>
      </div>
      <div class="sidebar-conversations" id="sidebar-conversations">
        <!-- Conversation history items go here -->
      </div>
    </aside>

    <!-- Main content -->
    <main class="main-content" id="main-content">
      <!-- Top bar -->
      <header class="topbar">
        <div class="topbar-left">
          <button class="sidebar-open-btn" id="sidebar-open">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="9" y1="3" x2="9" y2="21"></line>
            </svg>
          </button>
          <div class="model-selector">
            <span class="model-name">Ollama Chat</span>
          </div>
        </div>
        <div class="topbar-right">
          <button class="settings-btn" id="settings-btn" title="Settings">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="3"></circle>
              <path
                d="M12 1v6m0 6v6m0-18a10 10 0 0 0 0 20 10 10 0 0 0 0-20z"
              ></path>
              <path
                d="M12 2.69l2.12 2.12M12 19.31l2.12 2.12M12 2.69L9.88 4.81M12 19.31L9.88 21.43"
              ></path>
              <path
                d="M4.81 9.88L2.69 12l2.12 2.12M19.19 9.88L21.31 12l-2.12 2.12"
              ></path>
            </svg>
          </button>
        </div>
      </header>

      <!-- Messages area -->
      <div class="messages-wrapper">
        <div class="messages" id="messages">
          <div class="empty-state" id="empty-state">
            <div class="empty-state-icon">
              <svg
                width="40"
                height="40"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
                ></path>
              </svg>
            </div>
            <h2>How can I help you today?</h2>
            <div class="suggestion-grid">
              <button
                class="suggestion-card"
                data-prompt="Explain quantum computing in simple terms"
              >
                <span class="suggestion-title">Explain quantum computing</span>
                <span class="suggestion-sub">in simple terms</span>
              </button>
              <button
                class="suggestion-card"
                data-prompt="Write a Python script to sort a list of dictionaries by a key"
              >
                <span class="suggestion-title">Write a Python script</span>
                <span class="suggestion-sub"
                  >to sort a list of dictionaries</span
                >
              </button>
              <button
                class="suggestion-card"
                data-prompt="What are the best practices for REST API design?"
              >
                <span class="suggestion-title">Best practices</span>
                <span class="suggestion-sub">for REST API design</span>
              </button>
              <button
                class="suggestion-card"
                data-prompt="Help me debug a JavaScript async/await issue"
              >
                <span class="suggestion-title">Help me debug</span>
                <span class="suggestion-sub"
                  >a JavaScript async/await issue</span
                >
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Input area -->
      <div class="input-area">
        <div class="input-container">
          <textarea
            id="message-input"
            placeholder="Message Ollama..."
            rows="1"
          ></textarea>
          <button id="send-button" class="send-btn" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
            </svg>
          </button>
        </div>
        <p class="input-disclaimer">
          Ollama can make mistakes. Consider checking important information.
        </p>
      </div>
    </main>

    <!-- Settings Modal -->
    <div class="modal" id="settings-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Settings</h2>
          <button class="modal-close" id="modal-close">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="username-input">Username</label>
            <input
              type="text"
              id="username-input"
              placeholder="Enter your username"
              maxlength="20"
            />
          </div>
          <div class="form-group">
            <label for="system-prompt-input">System Prompt</label>
            <textarea
              id="system-prompt-input"
              placeholder="Enter system prompt for the AI (optional)"
              rows="4"
            ></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" id="cancel-btn">Cancel</button>
          <button class="btn-primary" id="save-settings-btn">Save</button>
        </div>
      </div>
    </div>

    <script src="chat.js"></script>
  </body>
</html>
